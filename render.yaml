databases:
  - name: constructiq-db
    plan: free
    databaseName: constructiq
    user: constructiq
    ipAllowList: []

services:
  # ------------------------------------
  # 1. Redis Cache & Broker
  # ------------------------------------
  - type: redis
    name: constructiq-redis
    plan: free
    ipAllowList: []

  # ------------------------------------
  # 3. FastAPI Backend API
  # ------------------------------------
  - type: web
    name: constructiq-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: constructiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: constructiq-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: constructiq-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: constructiq-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.2"
      - key: FRONTEND_URL
        value: "https://constructiq-ebi.pages.dev"
      - key: SECRET_KEY
        generateValue: true

  # ------------------------------------
  # 4. Celery Worker (Background Tasks)
  # ------------------------------------
  - type: worker
    name: constructiq-celery
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A app.core.celery_app worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: constructiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: constructiq-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: constructiq-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: constructiq-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.2"
